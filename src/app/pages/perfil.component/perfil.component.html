<div class="container py-5 fade-in" style="max-width: 600px;">
  
  <div class="text-center mb-5">
    <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3 shadow-sm" style="width: 100px; height: 100px;">
      <i class="bi bi-person-circle display-1"></i>
    </div>
    <h2 class="fw-bold text-dark">Mi Perfil</h2>
    <p class="text-muted">Información personal de tu cuenta</p>
  </div>

  <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
    <div class="card-body p-4 p-md-5">
      
      <div class="row g-4">
        
        <div class="col-12 col-md-6">
          <label class="form-label text-secondary small fw-bold text-uppercase">Nombre</label>
          <div class="p-3 bg-light rounded-3 text-dark fw-semibold border">{{ usuario.nombre | titlecase }}</div>
        </div>

        <div class="col-12 col-md-6">
          <label class="form-label text-secondary small fw-bold text-uppercase">Apellido</label>
          <div class="p-3 bg-light rounded-3 text-dark fw-semibold border">{{ usuario.apellido | titlecase }}</div>
        </div>

        <div class="col-12">
          <label class="form-label text-secondary small fw-bold text-uppercase">Correo Electrónico</label>
          <div class="p-3 bg-light rounded-3 text-dark fw-semibold border d-flex align-items-center gap-2">
            <i class="bi bi-envelope-fill text-primary"></i> {{ usuario.email }}
          </div>
        </div>

        <div class="col-12">
          <label class="form-label text-secondary small fw-bold text-uppercase">Teléfono</label>
          <div class="p-3 bg-light rounded-3 text-dark fw-semibold border d-flex align-items-center gap-2">
            <i class="bi bi-telephone-fill text-success"></i> {{ usuario.telefono }}
          </div>
        </div>

        <div class="col-12">
          <label class="form-label text-secondary small fw-bold text-uppercase">Rol</label>
          <div class="p-3 bg-light rounded-3 text-dark fw-semibold border d-flex align-items-center gap-2">
            <i class="bi bi-person-badge-fill text-success"></i> {{ usuario.rol | uppercase }}
          </div>
        </div>

      </div>

      <div class="mt-4 pt-4 border-top text-center">
        <p class="text-muted small">¿Necesitas modificar tus datos? <a href="#" class="text-primary fw-bold text-decoration-none">Contactar al soporte técnico</a></p>
      </div>

    </div>
  </div>
</div>
